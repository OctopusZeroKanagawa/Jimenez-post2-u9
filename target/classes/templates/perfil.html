<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mi Perfil</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-layout">

    <nav class="topbar">
        <span class="brand">seguridad_web / perfil</span>
        <div class="nav-links">
            <a th:href="@{/dashboard}">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger"
                        style="padding:0.3rem 0.8rem; font-size:0.82rem;">
                    Cerrar sesion
                </button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title">Mi Perfil</h1>
        <p class="page-subtitle">
            Sesion activa: <strong sec:authentication="name">email</strong>
        </p>
        <hr class="divider"/>

        <!--
          actualizarNombre() en el servicio tiene:
          @PreAuthorize("#usuario.email == authentication.name or hasRole('ADMIN')")
          Esto impide que un USER modifique el perfil de otro usuario via POST directo.
        -->
        <form th:action="@{/perfil}" th:object="${usuarioObj}" method="post">
            <div class="form-group">
                <label>Correo (no editable)</label>
                <input type="email" th:value="*{email}" disabled
                       style="opacity:0.5; cursor:not-allowed;"/>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}"
                       placeholder="Tu nombre completo" required/>
                <p style="font-size:0.75rem; color:var(--muted); margin-top:0.3rem;">
                    Prueba XSS: ingresa <code>&lt;script&gt;alert("XSS")&lt;/script&gt;</code>
                    y verifica que el dashboard muestra texto literal, no ejecuta el script.
                </p>
            </div>
            <button type="submit" class="btn btn-primary" style="width:auto; padding:0.65rem 1.8rem;">
                Guardar cambios
            </button>
        </form>

    </main>
</div>
</body>
</html>
